<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Coupled legacy .NET workflow before modernization</title>
  <desc id="desc">A single legacy service mixes user input, validation, pricing, persistence, notifications, and deployment risk.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#190a12"/>
      <stop offset="1" stop-color="#070912"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity=".35"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#fb7185"/></marker>
  </defs>
  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <text x="64" y="72" fill="#fda4af" font-family="Arial,sans-serif" font-size="20" font-weight="700" letter-spacing="2">BEFORE · COUPLED LEGACY WORKFLOW</text>
  <text x="64" y="122" fill="#fff" font-family="Arial,sans-serif" font-size="42" font-weight="800">One change touches everything.</text>
  <text x="64" y="158" fill="#cbd5e1" font-family="Arial,sans-serif" font-size="20">Behavior is valuable, but boundaries and operational evidence are implicit.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="250" width="210" height="110" rx="18" fill="#33121d" stroke="#fb7185" stroke-width="2"/>
    <text x="175" y="292" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="22" font-weight="700">Users / files</text>
    <text x="175" y="326" text-anchor="middle" fill="#fecdd3" font-family="Arial,sans-serif" font-size="17">retries · exceptions</text>

    <rect x="385" y="205" width="430" height="210" rx="24" fill="#451524" stroke="#fb7185" stroke-width="3"/>
    <text x="600" y="252" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="28" font-weight="800">LegacyOrderProcessor</text>
    <text x="600" y="292" text-anchor="middle" fill="#fecdd3" font-family="Arial,sans-serif" font-size="18">validation + pricing + tax + status</text>
    <text x="600" y="326" text-anchor="middle" fill="#fecdd3" font-family="Arial,sans-serif" font-size="18">persistence + notifications + error behavior</text>
    <text x="600" y="368" text-anchor="middle" fill="#fda4af" font-family="Arial,sans-serif" font-size="17" font-weight="700">No explicit idempotency · no traceable receipt</text>

    <rect x="920" y="225" width="210" height="110" rx="18" fill="#33121d" stroke="#fb7185" stroke-width="2"/>
    <text x="1025" y="267" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="22" font-weight="700">Database</text>
    <text x="1025" y="301" text-anchor="middle" fill="#fecdd3" font-family="Arial,sans-serif" font-size="17">implicit contract</text>

    <rect x="920" y="375" width="210" height="110" rx="18" fill="#33121d" stroke="#fb7185" stroke-width="2"/>
    <text x="1025" y="417" text-anchor="middle" fill="#fff" font-family="Arial,sans-serif" font-size="22" font-weight="700">Downstream</text>
    <text x="1025" y="451" text-anchor="middle" fill="#fecdd3" font-family="Arial,sans-serif" font-size="17">fire-and-forget</text>
  </g>

  <path d="M280 305 H378" stroke="#fb7185" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M815 275 H912" stroke="#fb7185" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M815 350 C865 350 865 430 912 430" fill="none" stroke="#fb7185" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="70" y="510" width="1060" height="68" rx="16" fill="#24101a" stroke="#7f1d1d"/>
  <text x="600" y="552" text-anchor="middle" fill="#fecaca" font-family="Arial,sans-serif" font-size="19" font-weight="700">Release risk expands faster than the business value of the requested change.</text>
</svg>
