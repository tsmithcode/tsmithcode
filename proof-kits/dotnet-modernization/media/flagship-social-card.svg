    <text x="96" y="411" fill="#fff" font-family="Arial,sans-serif" font-size="24" font-weight="700">Characterization + parity</text>
    <text x="96" y="448" fill="#fff" font-family="Arial,sans-serif" font-size="24" font-weight="700">Idempotency + outbox</text>
    <text x="96" y="485" fill="#fff" font-family="Arial,sans-serif" font-size="24" font-weight="700">API + observability</text>

    <rect x="610" y="325" width="526" height="200" rx="24" fill="#102d2e" stroke="#5eead4" stroke-width="2"/>
    <text x="642" y="370" fill="#99f6e4" font-family="Arial,sans-serif" font-size="18" font-weight="800">DECISION PROOF</text>
    <text x="642" y="411" fill="#fff" font-family="Arial,sans-serif" font-size="24" font-weight="700">Migration reconciliation</text>
