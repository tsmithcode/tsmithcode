  <rect x="64" y="560" width="1072" height="2" fill="#164e63"/>
  <text x="64" y="598" fill="#67e8f9" font-family="Arial,sans-serif" font-size="18" font-weight="800">github.com/tsmithcode/tsmithcode/tree/main/proof-kits/dotnet-modernization</text>
