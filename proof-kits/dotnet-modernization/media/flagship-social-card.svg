  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#061b2c"/><stop offset=".55" stop-color="#071522"/><stop offset="1" stop-color="#0b2f32"/></linearGradient>
    <radialGradient id="glow"><stop offset="0" stop-color="#22d3ee" stop-opacity=".32"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity=".42"/></filter>
  </defs>
  <rect width="1200" height="630" rx="30" fill="url(#bg)"/>
  <circle cx="1060" cy="80" r="360" fill="url(#glow)"/>
  <circle cx="120" cy="650" r="280" fill="url(#glow)" opacity=".5"/>

  <text x="64" y="78" fill="#67e8f9" font-family="Arial,sans-serif" font-size="22" font-weight="800" letter-spacing="3">TSMITHCODE.AI · PUBLIC ENGINEERING PROOF</text>
